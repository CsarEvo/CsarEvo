<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CsarEvo Plyr Player</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { width: 100%; max-width: 900px; }
    </style>
</head>
<body>

<div class="container">
    <div id="player" data-plyr-provider="youtube" data-plyr-embed-id=""></div>
</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
<script>
    // 1. Obtener el ID del video de la URL (?v=ID)
    const urlParams = new URLSearchParams(window.location.search);
    const videoId = urlParams.get('v');

    if (videoId) {
        // 2. Insertar el ID en el atributo de Plyr
        const playerElement = document.getElementById('player');
        playerElement.setAttribute('data-plyr-embed-id', videoId);

        // 3. Inicializar el reproductor
        const player = new Plyr('#player', {
            autoplay: true,
            settings: ['quality', 'speed', 'loop']
        });
    } else {
        document.body.innerHTML = "<h1 style='color:white; text-align:center;'>Error: No se proporcionó un ID de video</h1>";
    }
</script>

</body>
</html>
